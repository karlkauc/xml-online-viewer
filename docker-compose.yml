services:
  fundsxml-validator:
    build: .
    image: fundsxml-online-validator:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8092:8080"
    environment:
      # ALLOWED_SCHEMA_HOSTS unset → any public http(s) host permitted for the
      # URL loaders (private-IP/SSRF guards still active). Lock down with a
      # comma-separated list of host regexes if desired.
      LOG_LEVEL: INFO
      MAX_UPLOAD_MB: "50"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys;r=urllib.request.urlopen('http://127.0.0.1:8080/api/health',timeout=3);sys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
